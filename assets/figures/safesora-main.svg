<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">Safe-Sora graphical watermarking overview</title>
  <desc id="desc">A compact visual summary showing watermark patches matched to video frames, embedded through a spatiotemporal module, and recovered from watermarked video.</desc>
  <defs>
    <linearGradient id="safeBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#e8f3ee"/>
    </linearGradient>
    <pattern id="grid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M18 0H0V18" fill="none" stroke="#d9d0bf" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="760" height="280" fill="url(#safeBg)"/>
  <rect width="760" height="280" fill="url(#grid)" opacity=".45"/>
  <text x="30" y="42" fill="#20211e" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">Safe-Sora</text>
  <text x="30" y="68" fill="#636861" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14">Graphical watermarking inside text-to-video generation</text>

  <g transform="translate(34 98)">
    <rect x="0" y="0" width="126" height="126" rx="8" fill="#fffdf8" stroke="#20211e" stroke-width="2"/>
    <text x="18" y="26" fill="#b5493d" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">Watermark</text>
    <g transform="translate(18 42)">
      <rect width="38" height="38" fill="#1b7465"/>
      <rect x="44" width="38" height="38" fill="#c6922d"/>
      <rect y="44" width="38" height="38" fill="#2e5f85"/>
      <rect x="44" y="44" width="38" height="38" fill="#b5493d"/>
    </g>
  </g>

  <path d="M180 161H247" fill="none" stroke="#20211e" stroke-width="2"/>
  <path d="M247 161l-12-7v14z" fill="#20211e"/>

  <g transform="translate(260 91)">
    <rect x="0" y="0" width="66" height="92" rx="6" fill="#d7e8f4" stroke="#20211e"/>
    <rect x="18" y="14" width="30" height="30" rx="4" fill="#2e5f85"/>
    <rect x="8" y="58" width="50" height="18" rx="3" fill="#fffdf8" opacity=".9"/>
    <rect x="82" y="18" width="66" height="92" rx="6" fill="#e9f0df" stroke="#20211e"/>
    <rect x="100" y="32" width="30" height="30" rx="4" fill="#1b7465"/>
    <rect x="90" y="76" width="50" height="18" rx="3" fill="#fffdf8" opacity=".9"/>
    <rect x="164" y="2" width="66" height="92" rx="6" fill="#f4dfd8" stroke="#20211e"/>
    <rect x="182" y="16" width="30" height="30" rx="4" fill="#b5493d"/>
    <rect x="172" y="60" width="50" height="18" rx="3" fill="#fffdf8" opacity=".9"/>
    <text x="28" y="134" fill="#20211e" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">coarse-to-fine visual matching</text>
  </g>

  <path d="M512 161h53" fill="none" stroke="#20211e" stroke-width="2"/>
  <path d="M565 161l-12-7v14z" fill="#20211e"/>

  <g transform="translate(566 96)">
    <rect x="0" y="0" width="158" height="118" rx="10" fill="#fffdf8" stroke="#20211e" stroke-width="2"/>
    <path d="M22 26h114M22 54h114M22 82h114" stroke="#d8d1c3" stroke-width="8" stroke-linecap="round"/>
    <path d="M34 30c28 34 64 34 92 0" fill="none" stroke="#1b7465" stroke-width="5"/>
    <path d="M34 58c28 34 64 34 92 0" fill="none" stroke="#2e5f85" stroke-width="5"/>
    <path d="M34 86c28 34 64 34 92 0" fill="none" stroke="#b5493d" stroke-width="5"/>
    <text x="24" y="142" fill="#20211e" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">3D wavelet + Mamba</text>
  </g>
</svg>
