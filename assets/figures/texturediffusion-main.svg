<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" role="img" aria-labelledby="title desc">
  <title id="title">TextureDiffusion overview</title>
  <desc id="desc">A compact visual summary showing target prompt disentanglement, structure preservation, and rich texture transfer.</desc>
  <defs>
    <linearGradient id="texBg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#edf4f2"/>
    </linearGradient>
    <pattern id="flame" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M10 34c16-12 2-19 18-32-2 15 10 17-4 32z" fill="#b5493d"/>
      <path d="M15 34c10-8 2-13 12-22-1 10 6 12-2 22z" fill="#c6922d"/>
    </pattern>
    <pattern id="cloud" width="42" height="28" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="18" r="8" fill="#e8eef2"/>
      <circle cx="20" cy="12" r="11" fill="#dbe5eb"/>
      <circle cx="31" cy="18" r="8" fill="#e8eef2"/>
    </pattern>
    <pattern id="water" width="42" height="24" patternUnits="userSpaceOnUse">
      <path d="M0 12c10-9 20 9 30 0s20 9 30 0" fill="none" stroke="#2e5f85" stroke-width="4"/>
    </pattern>
  </defs>
  <rect width="760" height="280" fill="url(#texBg)"/>
  <text x="30" y="42" fill="#20211e" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">TextureDiffusion</text>
  <text x="30" y="68" fill="#636861" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14">Target prompt disentangled editing for texture transfer</text>

  <g transform="translate(32 102)">
    <rect x="0" y="0" width="140" height="118" rx="10" fill="#fffdf8" stroke="#20211e" stroke-width="2"/>
    <path d="M70 20c33 0 52 21 46 52-5 25-25 33-46 33s-41-8-46-33c-6-31 13-52 46-52z" fill="#e9f0df" stroke="#20211e" stroke-width="3"/>
    <path d="M34 63h72M70 24v82" stroke="#829189" stroke-width="2" stroke-dasharray="5 5"/>
    <text x="28" y="144" fill="#20211e" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">input structure</text>
  </g>

  <path d="M194 161h66" fill="none" stroke="#20211e" stroke-width="2"/>
  <path d="M260 161l-12-7v14z" fill="#20211e"/>

  <g transform="translate(272 98)">
    <rect x="0" y="0" width="170" height="126" rx="10" fill="#fff4df" stroke="#20211e" stroke-width="2"/>
    <text x="20" y="34" fill="#b5493d" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">target prompt</text>
    <rect x="20" y="52" width="130" height="30" rx="5" fill="#fffdf8" stroke="#d8d1c3"/>
    <text x="38" y="72" fill="#20211e" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14">&lt;texture&gt;</text>
    <path d="M22 98h126" stroke="#20211e" stroke-width="2"/>
    <text x="28" y="116" fill="#636861" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="12">disentangled from content</text>
  </g>

  <path d="M462 161h54" fill="none" stroke="#20211e" stroke-width="2"/>
  <path d="M516 161l-12-7v14z" fill="#20211e"/>

  <g transform="translate(530 92)">
    <rect x="0" y="0" width="178" height="146" rx="10" fill="#fffdf8" stroke="#20211e" stroke-width="2"/>
    <g transform="translate(18 20)">
      <rect width="42" height="42" rx="6" fill="url(#flame)" stroke="#20211e"/>
      <rect x="50" width="42" height="42" rx="6" fill="url(#cloud)" stroke="#20211e"/>
      <rect x="100" width="42" height="42" rx="6" fill="url(#water)" stroke="#20211e"/>
      <path d="M71 68c33 0 52 19 46 48H25c-6-29 13-48 46-48z" fill="#e9f0df" stroke="#20211e" stroke-width="3"/>
      <path d="M24 116h94" stroke="#1b7465" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="24" y="166" fill="#20211e" font-family="Aptos, 'Trebuchet MS', sans-serif" font-size="14" font-weight="700">structure kept, texture changed</text>
  </g>
</svg>
